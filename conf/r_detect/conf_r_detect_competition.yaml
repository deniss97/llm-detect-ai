seed: 424
use_wandb: false
input_data_dir: /qwarium/home/d.a.lanovenko/llm-detect-ai/datasets

model:
  backbone_path: mistralai/Mistral-7B-v0.1
  max_length: 256  # Minimal length to fit in GPU memory
  num_labels: 1
  
  tokenizer:
    padding_side: left
    truncation_side: left
    use_fast: false  # Changed to avoid tokenizer compatibility issues

  lora:
    target_modules:
      - q_proj
      - k_proj
    r: 4  # Minimal LoRA rank to save memory
    lora_alpha: 8
    lora_dropout: 0.1
    modules_to_save:
      - classification_head

train_params:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  num_train_epochs: 2  # Reduced from 3 to save time
  gradient_accumulation_steps: 32  # Increased to compensate for smaller batch
  warmup_pct: 0.1
  eval_frequency: 42  # Evaluate every epoch (42 steps per epoch)
  patience: 10
  save_trigger: 0.80
  use_mask_aug: false

optimizer:
  name: AdamW  # Changed from AdamW8bit for compatibility
  head_lr: 1e-6
  lr: 1e-5
  weight_decay: 1e-2
  max_grad_norm: 0.5

outputs:
  model_dir: /qwarium/home/d.a.lanovenko/models/r_detect_competition

wandb:
  project: detect-ai-a1
  run_name: exp002-competition-detect
  tags:
    - mistral
    - competition
