seed: 424
use_wandb: false
input_data_dir: /qwarium/home/d.a.lanovenko/llm-detect-ai/datasets

model:
  backbone_path: mistralai/Mistral-7B-v0.1
  max_length: 256  # Ещё больше уменьшено для тестов
  num_labels: 1
  
  tokenizer:
    padding_side: left
    truncation_side: left
    use_fast: false  # Changed to avoid tokenizer compatibility issues

  lora:
    target_modules:
      - q_proj
      - k_proj
    r: 8
    lora_alpha: 16
    lora_dropout: 0.1
    modules_to_save:
      - classification_head
  use_4bit: false  # Отключено для обхода проблемы bitsandbytes

train_params:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  num_train_epochs: 1
  gradient_accumulation_steps: 16
  warmup_pct: 0.1
  eval_frequency: 50  # Reduced to ensure at least one eval during training
  patience: 5
  save_trigger: 0.0
  use_mask_aug: false

optimizer:
  name: AdamW  # Changed from AdamW8bit for compatibility
  head_lr: 2e-6
  lr: 2e-5
  weight_decay: 1e-2
  max_grad_norm: 0.5

outputs:
  model_dir: /tmp/models/r_detect_mini

wandb:
  project: detect-ai-a1
  run_name: exp001-mini-detect
  tags:
    - mistral
    - mini
