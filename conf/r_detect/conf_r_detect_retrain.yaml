seed: 424
use_wandb: false
input_data_dir: /qwarium/home/d.a.lanovenko/llm-detect-ai/datasets

# Use external dataset for additional training data
external_data_dir: null

model:
  backbone_path: mistralai/Mistral-7B-v0.1
  max_length: 256
  num_labels: 1
  
  tokenizer:
    padding_side: left
    truncation_side: left
    use_fast: false  # Use slow tokenizer to avoid compatibility issues

  lora:
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    modules_to_save:
      - classification_head

train_params:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  num_train_epochs: 2
  gradient_accumulation_steps: 8
  warmup_pct: 0.1
  eval_frequency: 100
  patience: 3
  save_trigger: 0.80
  use_mask_aug: false

optimizer:
  name: AdamW
  head_lr: 5e-6
  lr: 2e-5
  weight_decay: 0.01
  max_grad_norm: 1.0

outputs:
  model_dir: /qwarium/home/d.a.lanovenko/models/r_detect_retrain

wandb:
  project: detect-ai-a1
  run_name: exp-retrain-2026
  tags:
    - mistral
    - retrain
    - new-data
